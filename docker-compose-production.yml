name: agentrove

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox-setup:
    image: docker:27-cli
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["sh", "-c", "docker pull $${DOCKER_IMAGE}"]
    environment:
      DOCKER_IMAGE: ${DOCKER_IMAGE:-ghcr.io/mng-dev-ai/agentrove-sandbox:latest}

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["api"]
    user: root
    privileged: true
    group_add:
      - "0"
    depends_on:
      redis:
        condition: service_healthy
      sandbox-setup:
        condition: service_completed_successfully
    volumes:
      - /data/agentrove/storage:/data/agentrove/storage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ENVIRONMENT: production
      DATABASE_URL: sqlite+aiosqlite:////data/agentrove/storage/agentrove.db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY to a 32+ character value before starting production}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-}
      STORAGE_PATH: /data/agentrove/storage
      DOCKER_IMAGE: ${DOCKER_IMAGE:-ghcr.io/mng-dev-ai/agentrove-sandbox:latest}
      DOCKER_NETWORK: agentrove-sandbox-net
      DOCKER_PERMISSION_API_URL: http://api:8080
      HOST_PERMISSION_API_URL: http://api:8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      BASE_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${APP_URL:-http://localhost}
    networks:
      - default
      - sandbox
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend-build:
    image: node:20-alpine
    restart: "no"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_dist:/dist
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_WS_URL: /api/v1/ws
    command: ["sh", "-c", "npm ci --legacy-peer-deps && npm run build -- --outDir /dist --emptyOutDir"]

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;

          root /usr/share/nginx/html;
          index index.html;

          client_max_body_size 10m;

          location /api/ {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
          }

          location /admin {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location /health {
            proxy_pass http://api:8080/health;
          }

          location / {
            try_files $$uri $$uri/ /index.html;
          }
        }
        EOF
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 12

networks:
  sandbox:
    name: agentrove-sandbox-net

volumes:
  redis_data:
  frontend_node_modules:
  frontend_dist:
