name: agentrove

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox-setup:
    image: docker:27-cli
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["sh", "-c", "docker pull $${DOCKER_IMAGE}"]
    environment:
      DOCKER_IMAGE: ${DOCKER_IMAGE:-ghcr.io/mng-dev-ai/agentrove-sandbox:latest}

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["api"]
    user: root
    privileged: true
    group_add:
      - "0"
    depends_on:
      redis:
        condition: service_healthy
      sandbox-setup:
        condition: service_completed_successfully
    volumes:
      - /data/agentrove/storage:/data/agentrove/storage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ENVIRONMENT: production
      DATABASE_URL: sqlite+aiosqlite:////data/agentrove/storage/agentrove.db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY to a 32+ character value before starting production}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-}
      STORAGE_PATH: /data/agentrove/storage
      DOCKER_IMAGE: ${DOCKER_IMAGE:-ghcr.io/mng-dev-ai/agentrove-sandbox:latest}
      DOCKER_NETWORK: agentrove-sandbox-net
      DOCKER_PERMISSION_API_URL: http://api:8080
      HOST_PERMISSION_API_URL: http://api:8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      BASE_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${APP_URL:-http://localhost}
    networks:
      - default
      - sandbox
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - SERVICE_FQDN_WEB_80
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 12

networks:
  sandbox:
    name: agentrove-sandbox-net

volumes:
  redis_data:
